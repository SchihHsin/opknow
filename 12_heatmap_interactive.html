<head>
<meta charset="UTF-8">

<title>细分指标热力图 · 可点击下钻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');
  :root{--bg:#F2F3F7;--white:#fff;--black:#0A0A0F;--g1:#1C1C28;--g2:#3D3D50;--g3:#6B6B80;--g4:#A0A0B0;--g6:#ECEEF3;--nv:#76B900;--hw:#C8102E;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--black);padding:34px 36px 56px;min-width:1180px;}
  .title{font-size:21px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .title::before{content:'';width:4px;height:21px;background:var(--black);border-radius:2px;}
  .sub{font-size:12.5px;color:var(--g4);margin:7px 0 18px 14px;line-height:1.6;}
  .hint{font-size:11px;color:var(--nv);font-weight:700;}

  table.hm{border-collapse:separate;border-spacing:2px;background:#fff;border:1px solid var(--g6);border-radius:10px;padding:6px;font-size:10.5px;width:100%;}
  table.hm th,table.hm td{padding:6px 5px;text-align:center;}
  th.col{font-size:9.5px;font-weight:700;color:var(--g2);background:#FAFBFC;border-radius:5px;line-height:1.25;padding:6px 4px;vertical-align:bottom;}
  th.col small{display:block;color:var(--g4);font-weight:400;font-size:8px;}
  th.grp{font-size:9px;font-weight:800;color:#fff;border-radius:5px;padding:3px;}
  .g-off{background:#475569;} .g-sec{background:#6b5b95;} .g-mod{background:#1d7a8c;} .g-ret{background:#a16207;} .g-out{background:#0d7956;} .g-sum{background:#1C1C28;}
  td.task{font-weight:800;color:var(--g1);background:#F1F3F7;border-radius:5px;text-align:left;padding:6px 9px;cursor:pointer;font-size:11px;width:120px;}
  td.task small{display:block;font-weight:400;color:var(--g4);font-size:8.5px;margin-top:1px;}
  td.stk{font-size:9.5px;font-weight:800;color:#fff;border-radius:5px;width:48px;cursor:pointer;}
  td.stk.nv{background:var(--nv);} td.stk.hw{background:var(--hw);}
  tr.row{cursor:pointer;}
  tr.row:hover td.cell{filter:brightness(.97);}
  tr.row.active td.task,tr.row.active td.stk{outline:2px solid #2563EB;}
  .cell{border-radius:5px;font-weight:800;font-size:10.5px;position:relative;}
  .v5{background:#BBF0D4;color:#04603A;} .v4{background:#DCF5E5;color:#0A6B4E;} .v3{background:#FCEFC7;color:#92620A;} .v2{background:#FBE0CE;color:#9A4A12;} .v1{background:#F9D2D2;color:#A11414;}
  .inf{position:absolute;top:0;right:2px;font-size:7px;color:#B45309;font-weight:800;}
  .pick{font-size:8px;color:#2563EB;font-weight:700;}

  .legend{display:flex;gap:8px;align-items:center;margin:13px 0 4px 6px;font-size:10.5px;color:var(--g3);flex-wrap:wrap;}
  .legend .sw{width:22px;height:13px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;}

  #detail{margin-top:22px;}
  .dh{display:flex;align-items:baseline;gap:10px;margin:0 0 4px 2px;}
  .dh .dn{font-size:17px;font-weight:800;}
  .dh .dv{font-size:9px;font-weight:700;padding:1px 8px;border-radius:100px;}
  .v-hi{background:#FEF2F2;color:#B91C1C;} .v-mid{background:#FEFCE8;color:#A16207;} .v-lo{background:#F0FDFA;color:#0D7956;}
  .dh .dq{font-size:11.5px;color:var(--g4);margin-left:auto;}
  .lanes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px;}
  .lane{background:#fff;border:1px solid var(--g6);border-radius:12px;overflow:hidden;}
  .lane-h{padding:10px 15px;display:flex;align-items:center;gap:9px;color:#fff;}
  .lane.nv .lane-h{background:var(--nv);} .lane.hw .lane-h{background:var(--hw);}
  .lane-h .who{font-size:13px;font-weight:800;} .lane-h .conf{font-size:10.5px;font-weight:700;margin-left:auto;background:rgba(255,255,255,.22);padding:2px 9px;border-radius:100px;}
  .steps{padding:13px 15px;}
  .step{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--g6);}
  .step:last-child{border-bottom:none;}
  .snum{font-size:10px;font-weight:800;color:#fff;background:var(--g3);min-width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step.dec .snum{background:#D97706;} .step.tool .snum{background:#0D7956;} .step.warn .snum{background:#B8860B;} .step.score .snum{background:#1C1C28;} .step.nos .snum{background:#A0A0B0;}
  .sbody{flex:1;}
  .sac{font-size:12px;font-weight:700;color:var(--g1);line-height:1.4;}
  .sio{font-size:10.5px;color:var(--g3);line-height:1.55;margin-top:2px;}
  .sio code{font-family:ui-monospace,Menlo,monospace;background:#EEF0F4;border-radius:3px;padding:0 4px;font-size:9.5px;color:var(--g2);}
  .sio .l{font-weight:800;color:var(--g4);} .sio .lo{color:#0D7956;}
  .prob{font-size:10.5px;color:#B91C1C;background:#FEF2F2;border:1px solid #F6D6D6;border-radius:6px;padding:5px 9px;margin-top:5px;line-height:1.5;}
  .prob::before{content:'⚠ 问题：';font-weight:800;}
  .noprob{font-size:10px;color:#0D7956;margin-top:4px;} .noprob::before{content:'✓ 顺利';font-weight:700;}
  .pc{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
  .pcard{background:#fff;border:1px solid var(--g6);border-radius:12px;padding:14px 16px;}
  .pcard.nv{border-top:3px solid var(--nv);} .pcard.hw{border-top:3px solid var(--hw);}
  .pcard h4{font-size:13px;font-weight:800;margin-bottom:9px;} .pcard.nv h4{color:#4f7a00;} .pcard.hw h4{color:#9a0c22;}
  .pl{font-size:9.5px;font-weight:800;letter-spacing:.4px;color:var(--g4);margin:7px 0 4px;}
  .pitem{display:flex;gap:7px;font-size:11px;line-height:1.55;color:var(--g2);margin-bottom:4px;}
  .pitem .mk{flex-shrink:0;font-weight:800;} .up .mk{color:#0D7956;} .down .mk{color:#B91C1C;}
  .verdict{margin-top:14px;background:#fff;border:1px solid var(--g6);border-left:4px solid #2563EB;border-radius:0 10px 10px 0;padding:13px 17px;font-size:12.5px;color:var(--g2);line-height:1.65;}
  .verdict b{color:var(--g1);}
</style>
</head>

function cellHtml(c){return '<td class="cell '+c[0]+'">'+c[1]+(c[2]?'<span class="inf">*</span>':'')+'</td>';}
function renderHM(){

    h+='<tr class="row" data-k="'+k+'"><td class="task" rowspan="2">'+k+' · '+r.name+'<small>版本敏感·'+r.vsens+' · 点击展开 ▸</small></td>'
      +'<td class="stk nv">CUDA</td>'+r.cuda.map(cellHtml).join('')+'</tr>';
    h+='<tr class="row" data-k="'+k+'"><td class="stk hw">CANN</td>'+r.cann.map(cellHtml).join('')+'</tr>';
  }
  document.getElementById('hmbody').innerHTML=h;
  document.querySelectorAll('tr.row').forEach(tr=>tr.addEventListener('click',()=>select(tr.dataset.k)));
}
function stepHtml(s,i){const tail=s.prob?'<div class="prob">'+s.prob+'</div>':(s.ok?'<div class="noprob"></div>':'');
  return '<div class="step '+s.t+'"><div class="snum">'+(i+1)+'</div><div class="sbody"><div class="sac">'+s.ac+'</div><div class="sio">'+s.io+'</div>'+tail+'</div></div>';}
function laneHtml(side,arr,who,conf){return '<div class="lane '+side+'"><div class="lane-h"><span class="who">'+who+'</span><span class="conf">置信度 '+conf+'</span></div><div class="steps">'+arr.map(stepHtml).join('')+'</div></div>';}
function pcList(arr,cls){return arr.map(x=>'<div class="pitem '+cls+'"><span class="mk">'+(cls==='up'?'＋':'－')+'</span><span>'+x+'</span></div>').join('');}
function dvc(v){return {'高':'v-hi','中':'v-mid','低':'v-lo'}[v]||'';}
function select(k){
  document.querySelectorAll('tr.row').forEach(tr=>tr.classList.toggle('active',tr.dataset.k===k));
  const r=ROWS[k],d=DETAIL[k];
  document.getElementById('detail').innerHTML=
    '<div class="dh"><span class="dn">'+k+' · '+r.name+'</span><span class="dv '+dvc(r.vsens)+'">版本敏感·'+r.vsens+'</span><span class="dq">'+d.q+'</span></div>'
    +'<div class="lanes">'+laneHtml('nv',d.cuda,'英伟达 / NVIDIA 生态',d.cudaConf)+laneHtml('hw',d.cann,'昇腾社区',d.cannConf)+'</div>'
    +'<div class="pc"><div class="pcard nv"><h4>NVIDIA 生态</h4><div class="pl">优势</div>'+pcList(d.cudaUp,'up')+'<div class="pl">劣势 / 坑</div>'+pcList(d.cudaDown,'down')+'</div>'
    +'<div class="pcard hw"><h4>昇腾社区</h4><div class="pl">优势</div>'+pcList(d.cannUp,'up')+'<div class="pl">劣势 / 坑</div>'+pcList(d.cannDown,'down')+'</div></div>'
    +'<div class="verdict"><b>对比结论：</b>'+d.verdict+'</div>';
}
renderHM();
select('A');
</script>
</body>
