<style>

    --nv:#76B900;--hw:#C8102E;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--black);padding:34px 40px 56px;max-width:1280px;margin:0 auto;}
  .title{font-size:21px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .title::before{content:'';width:4px;height:21px;background:var(--black);border-radius:2px;}
  .sub{font-size:12.5px;color:var(--g4);margin:7px 0 20px 14px;line-height:1.6;}
  .hint{font-size:11px;color:var(--nv);font-weight:700;margin-left:6px;}

  table.mx{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--g6);border-radius:10px;overflow:hidden;font-size:12px;}
  table.mx th,table.mx td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--g6);}
  table.mx thead th{font-size:11.5px;font-weight:800;color:#fff;background:#2D2D3A;}
  table.mx thead th:nth-child(2){background:var(--nv);text-align:center;}
  table.mx thead th:nth-child(3){background:var(--hw);text-align:center;}
  table.mx td:nth-child(2),table.mx td:nth-child(3){text-align:center;}
  table.mx tr.run{cursor:pointer;transition:background .12s;}
  table.mx tr.run:hover{background:#F4F7FB;}
  table.mx tr.run.active{background:#EAF0FB;box-shadow:inset 4px 0 0 #2563EB;}
  table.mx tr.pend td{color:var(--g4);background:#FBFBFC;}
  .vt{font-size:9px;font-weight:700;padding:1px 7px;border-radius:100px;margin-left:8px;vertical-align:middle;}
  .v-hi{background:#FEF2F2;color:#B91C1C;} .v-mid{background:#FEFCE8;color:#A16207;} .v-lo{background:#F0FDFA;color:#0D7956;}
  .cf{font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:5px;}
  .cf-hi{background:#ECFDF5;color:#0D7956;} .cf-mid{background:#FEF7E6;color:#B45309;} .cf-pend{background:#F1F2F6;color:#9CA0AC;font-weight:700;}
  .tnm{font-weight:700;color:var(--g1);} .pend .tnm{font-weight:400;}
  .pick{font-size:9px;color:#2563EB;font-weight:700;margin-left:7px;}

  #detail{margin-top:18px;}
  .dh{display:flex;align-items:baseline;gap:10px;margin:0 0 4px 2px;}
  .dh .dn{font-size:17px;font-weight:800;}
  .dh .dv{font-size:9px;font-weight:700;padding:1px 8px;border-radius:100px;}
  .dh .dq{font-size:11.5px;color:var(--g4);margin-left:auto;}

  .lanes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px;}
  .lane{background:#fff;border:1px solid var(--g6);border-radius:12px;overflow:hidden;}
  .lane-h{padding:10px 15px;display:flex;align-items:center;gap:9px;color:#fff;}
  .lane.nv .lane-h{background:var(--nv);} .lane.hw .lane-h{background:var(--hw);}
  .lane-h .who{font-size:13px;font-weight:800;} .lane-h .conf{font-size:10.5px;font-weight:700;margin-left:auto;background:rgba(255,255,255,.22);padding:2px 9px;border-radius:100px;}
  .steps{padding:13px 15px;display:flex;flex-direction:column;gap:0;}
  .step{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--g6);}
  .step:last-child{border-bottom:none;}
  .snum{font-size:10px;font-weight:800;color:#fff;background:var(--g3);min-width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step.dec .snum{background:#D97706;} .step.tool .snum{background:#0D7956;} .step.warn .snum{background:#B8860B;} .step.score .snum{background:#1C1C28;} .step.nos .snum{background:#A0A0B0;}
  .sbody{flex:1;}
  .sac{font-size:12px;font-weight:700;color:var(--g1);line-height:1.4;}
  .sio{font-size:10.5px;color:var(--g3);line-height:1.55;margin-top:2px;}
  .sio code{font-family:ui-monospace,Menlo,monospace;background:#EEF0F4;border-radius:3px;padding:0 4px;font-size:9.5px;color:var(--g2);}
  .sio .l{font-weight:800;color:var(--g4);} .sio .lo{color:#0D7956;}
  .prob{font-size:10.5px;color:#B91C1C;background:#FEF2F2;border:1px solid #F6D6D6;border-radius:6px;padding:5px 9px;margin-top:5px;line-height:1.5;}
  .prob::before{content:'⚠ 问题：';font-weight:800;}
  .noprob{font-size:10px;color:#0D7956;margin-top:4px;}
  .noprob::before{content:'✓ 顺利';font-weight:700;}

  .pc{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
  .pcard{background:#fff;border:1px solid var(--g6);border-radius:12px;padding:14px 16px;}
  .pcard.nv{border-top:3px solid var(--nv);} .pcard.hw{border-top:3px solid var(--hw);}
  .pcard h4{font-size:13px;font-weight:800;margin-bottom:9px;}
  .pcard.nv h4{color:#4f7a00;} .pcard.hw h4{color:#9a0c22;}
  .pl{font-size:9.5px;font-weight:800;letter-spacing:.4px;color:var(--g4);margin:7px 0 4px;}
  .pitem{display:flex;gap:7px;font-size:11px;line-height:1.55;color:var(--g2);margin-bottom:4px;}
  .pitem .mk{flex-shrink:0;font-weight:800;}
  .up .mk{color:#0D7956;} .down .mk{color:#B91C1C;}
  .verdict{margin-top:14px;background:#fff;border:1px solid var(--g6);border-left:4px solid #2563EB;border-radius:0 10px 10px 0;padding:13px 17px;font-size:12.5px;color:var(--g2);line-height:1.65;}
  .verdict b{color:var(--g1);}
</style>
</head>

  ['量化'],['显存 / OOM 优化'],['访存 / occupancy 优化'],['…等 21 个']
];

function vchip(v){const m={'高':'v-hi','中':'v-mid','低':'v-lo'};return '<span class="vt '+(m[v]||'')+'">版本敏感·'+v+'</span>';}

function renderMatrix(){
  let h='';
  for(const k of ['A','B','C','D']){const d=DATA[k];
    h+='<tr class="run" data-k="'+k+'"><td><span class="tnm">'+k+' · '+d.name+'</span>'+vchip(d.vsens)+'<span class="pick">展开 ▸</span></td>'
      +'<td><span class="cf '+d.cudaCls+'">'+d.cudaConf+'</span></td>'
      +'<td><span class="cf '+d.cannCls+'">'+d.cannConf+'</span></td></tr>';}
  for(const p of PEND){
    h+='<tr class="pend"><td><span class="tnm">'+p[0]+'</span></td>'
      +'<td><span class="cf cf-pend">待跑</span></td><td><span class="cf cf-pend">待跑</span></td></tr>';}
  document.getElementById('mxbody').innerHTML=h;
  document.querySelectorAll('tr.run').forEach(tr=>tr.addEventListener('click',()=>select(tr.dataset.k)));
}

function stepHtml(s,i){
  const tail = s.prob ? '<div class="prob">'+s.prob+'</div>' : (s.ok ? '<div class="noprob"></div>' : '');
  return '<div class="step '+s.t+'"><div class="snum">'+(i+1)+'</div><div class="sbody"><div class="sac">'+s.ac+'</div><div class="sio">'+s.io+'</div>'+tail+'</div></div>';
}
function laneHtml(side,arr,who,conf){
  return '<div class="lane '+side+'"><div class="lane-h"><span class="who">'+who+'</span><span class="conf">置信度 '+conf+'</span></div><div class="steps">'+arr.map(stepHtml).join('')+'</div></div>';
}
function pcList(arr,cls){return arr.map(x=>'<div class="pitem '+cls+'"><span class="mk">'+(cls==='up'?'＋':'－')+'</span><span>'+x+'</span></div>').join('');}
function dvclass(v){return {'高':'v-hi','中':'v-mid','低':'v-lo'}[v]||'';}

function select(k){
  document.querySelectorAll('tr.run').forEach(tr=>tr.classList.toggle('active',tr.dataset.k===k));
  const d=DATA[k];
  document.getElementById('detail').innerHTML=
    '<div class="dh"><span class="dn">'+k+' · '+d.name+'</span><span class="dv '+dvclass(d.vsens)+'">版本敏感·'+d.vsens+'</span><span class="dq">'+d.q+'</span></div>'
    +'<div class="lanes">'+laneHtml('nv',d.cuda,'英伟达 / NVIDIA 生态',d.cudaConf)+laneHtml('hw',d.cann,'昇腾社区',d.cannConf)+'</div>'
    +'<div class="pc">'
      +'<div class="pcard nv"><h4>NVIDIA 生态</h4><div class="pl">优势</div>'+pcList(d.cudaUp,'up')+'<div class="pl">劣势 / 坑</div>'+pcList(d.cudaDown,'down')+'</div>'
      +'<div class="pcard hw"><h4>昇腾社区</h4><div class="pl">优势</div>'+pcList(d.cannUp,'up')+'<div class="pl">劣势 / 坑</div>'+pcList(d.cannDown,'down')+'</div>'
    +'</div>'
    +'<div class="verdict"><b>对比结论：</b>'+d.verdict+'</div>';
}

renderMatrix();
select('A');
</script>
</body>
</html>
